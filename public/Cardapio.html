<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardápio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav>
    <a href="index.html">Cadastro de Cliente</a> |
    <a href="ControleCliente.html">Controle de Clientes</a> |
    <a href="CheckInCheckOut.html">Check-in / Check-out</a> |
    <a href="cardapio.html" class="ativo">Cardápio</a>
  </nav>
  <hr />

  <fieldset>
    <legend>Gerenciar Cardápio</legend>
    <label for="nomeProduto">Nome do Produto:</label>
    <input type="text" id="nomeProduto" required>
    <label for="precoProduto">Preço:</label>
    <input type="number" id="precoProduto" step="0.01" required>
    <button type="button" onclick="adicionarProdutoCardapio()">Adicionar Produto</button>
  </fieldset>

  <table id="tabelaCardapio">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Preço</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <!-- Produtos serão inseridos aqui -->
    </tbody>
  </table>

  <script src="js/cardapio.js"></script>
</body>
</html>
