<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Clientes com Guias</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Menu de Guias -->
    <nav>
      <a href="index.html">Cadastro de Cliente</a> |
      <a href="ControleCliente.html">Controle de Clientes</a> |
      <a href="CheckInCheckOut.html">Check-in / Check-out</a> |
      <a href="ConsumoFrigobar.html">Consumo do Frigobar</a>
    </nav>

    <hr />

    <!-- Fieldset: Cadastro de Cliente -->
    <fieldset id="cadastroCliente">
      <legend>Cadastro de Cliente</legend>
      <label for="cpf">CPF:</label>
      <input
        type="text"
        id="cpf"
        name="cpf"
        placeholder="CPF"
        required
        pattern="\d{11}"
      />
      <br />
      <label for="nome">Nome Completo:</label>
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Nome Completo"
        required
      />
      <br />
      <label for="dataNascimento">Data de Nascimento:</label>
      <input type="date" id="dataNascimento" name="dataNascimento" required />
      <br />
      <label for="cep">CEP:</label>
      <input
        type="text"
        id="cep"
        name="cep"
        placeholder="CEP"
        required
        pattern="\d{5}-?\d{3}"
      />
      <br />
      <label for="endereco">Endereço:</label>
      <input
        type="text"
        id="endereco"
        name="endereco"
        placeholder="Endereço"
        required
      />
      <br />
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="E-mail"
        required
      />
      <br />
      <label for="telefone">Telefone:</label>
      <input
        type="text"
        id="telefone"
        name="telefone"
        placeholder="Telefone"
        required
      />
      <br />
      <label for="quarto">Número do Quarto:</label>
      <input
        type="text"
        id="quarto"
        name="quarto"
        placeholder="Número do Quarto"
        required
      />
      <br />
      <button type="button">Cadastrar</button>
    </fieldset>

    <hr />

    <script src="js/script.js"></script>
  </body>
</html>
