<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Clientes</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html">Cadastro de Cliente</a> |
      <a href="ControleCliente.html" class="ativo">Controle de Clientes</a> |
      <a href="CheckInCheckOut.html">Check-in / Check-out</a> |
      <a href="Cardapio.html">Cardápio</a>
    </nav>

    <fieldset id="controleClientes">
      <legend>Controle de Clientes</legend>
      <label for="filtro">Filtro:</label>
      <input
        type="text"
        id="filtro"
        name="filtro"
        placeholder="Digite o nome ou CPF"
      />
      <button type="button" onclick="filtrar()">Filtrar</button>
      <button type="button" onclick="limpar()">Limpar</button>
      <table id="tabelaClientes">
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Data de Nascimento</th>
            <th>CEP</th>
            <th>Endereço</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Quarto</th>
            <th>Frigobar</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </fieldset>
    <fieldset id="consumoFrigobar">
      <legend>Controle de Consumo do Frigobar</legend>
      <label for="numeroQuarto">Número do Quarto:</label>
      <input type="number" id="numeroQuarto" name="numeroQuarto" required />
      <label for="produto">Produto:</label>
      <input type="text" id="produto" placeholder="Nome do produto" list="listaCardapio" />
      <datalist id="listaCardapio"></datalist>
      <label for="quantidade">Quantidade:</label>
      <input type="number" id="quantidade" min="1" value="1" />
      <button type="button" onclick="adicionarProdutoFrigobar()">Adicionar</button>

      <table id="tabelaConsumo">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Preço Unitário</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="totalConsumo"></div>
    </fieldset>
    <script src="js/script.js"></script>
  </body>
</html>
