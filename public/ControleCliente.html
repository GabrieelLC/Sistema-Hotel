<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Clientes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
      <a href="index.html">Cadastro de Cliente</a> |
      <a href="ControleCliente.html">Controle de Clientes</a> |
      <a href="CheckInCheckOut.html">Check-in / Check-out</a> |
      <a href="ConsumoFrigobar.html">Consumo do Frigobar</a>
    </nav>
    
    <fieldset id="controleClientes">
      <legend>Controle de Clientes</legend>
      <label for="filtro">Filtro:</label>
      <input
        type="text"
        id="filtro"
        name="filtro"
        placeholder="Digite o nome ou CPF"
      />
      <button type="button">Filtrar</button>
      <button type="button">Limpar</button>
      <table id="tabelaClientes">
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Data de Nascimento</th>
            <th>CEP</th>
            <th>Endereço</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Quarto</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>João Silva</td>
            <td>123.456.789-00</td>
            <td>01/01/1980</td>
            <td>12345-678</td>
            <td>Rua A, 123</td>
            <td>joao.silva@example.com</td>
            <td>(11) 98765-4321</td>
            <td>101</td>
          </tr>
        </tbody>
      </table>
    </fieldset>
    <script src="js/script.js"></script>
</body>
</html>
